run:
  name: uniform-field-control
  seed: 19
  output_root: runs

engine:
  backend: numpy
  grid_shape: [12, 12, 12]
  box_size: 1.0
  mass: 1.0
  g_int: 0.03
  time_step: 0.015
  num_steps: 16
  log_every: 2

initial:
  kind: uniform
  amplitude: 0.8
  width: 0.4
  random_phase: false

objective:
  name: Initial-state control
  summary: Separate uniform initial-state behavior from localized Gaussian packet behavior.
  primary_metric: norm_drift
  goal: minimize_abs

constraints:
  max_abs_energy_drift: 0.2
  max_abs_norm_drift: 0.1
  max_elapsed_seconds: 10.0
  require_verification: true

ranking:
  primary_metric_weight: 2.0
  weights:
    energy_drift: 0.8
    norm_drift: 1.0
    elapsed_seconds: 0.2
