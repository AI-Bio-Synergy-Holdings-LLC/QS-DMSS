name: Contributor Task
description: Claim or propose a focused contributor task.
title: "[Contributor Task]: "
labels:
  - help wanted
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What small change are you proposing or claiming?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Likely Files
      description: List the files or modules you expect to touch, if known.
    validations:
      required: false
  - type: dropdown
    id: first-time
    attributes:
      label: Contributor Experience
      options:
        - First contribution to QS-DMSS
        - Returning contributor
        - Maintainer task
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation Plan
      description: What command, test, doc check, or smoke path should confirm the task is complete?
    validations:
      required: true
