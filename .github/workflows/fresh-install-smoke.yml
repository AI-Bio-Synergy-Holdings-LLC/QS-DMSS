name: Fresh Install Smoke

on:
  pull_request:
  workflow_dispatch:
    inputs:
      package_version:
        description: "Published package version to validate"
        required: true
        default: "0.13.2"
        type: string
      release_tag:
        description: "GitHub release tag containing the wheel"
        required: true
        default: "v0.13.2"
        type: string

permissions:
  contents: read

jobs:
  candidate-wheel:
    if: github.event_name == 'pull_request'
    name: candidate wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build candidate wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Run candidate fresh install smoke
        run: >
          python .github/scripts/fresh_install_smoke.py
          --source candidate-wheel
          --wheel-path dist

  published-release:
    if: github.event_name == 'workflow_dispatch'
    name: ${{ matrix.source }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        source:
          - pypi
          - release-wheel

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run published release smoke
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: >
          python .github/scripts/fresh_install_smoke.py
          --source ${{ matrix.source }}
          --package-version "$PACKAGE_VERSION"
          --release-tag "$RELEASE_TAG"
        if: runner.os != 'Windows'

      - name: Run published release smoke
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: >
          python .github/scripts/fresh_install_smoke.py
          --source ${{ matrix.source }}
          --package-version "$env:PACKAGE_VERSION"
          --release-tag "$env:RELEASE_TAG"
        if: runner.os == 'Windows'
