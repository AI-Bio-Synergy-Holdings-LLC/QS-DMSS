name: Fresh Install Smoke

on:
  pull_request:
  workflow_dispatch:
    inputs:
      package_version:
        description: "Published package version to validate"
        required: true
        default: "0.6.0"
        type: string
      release_tag:
        description: "GitHub release tag containing the wheel"
        required: true
        default: "v0.6.0"
        type: string

permissions:
  contents: read

jobs:
  fresh-install:
    name: ${{ matrix.source }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        source:
          - pypi
          - release-wheel

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run fresh install smoke
        env:
          PACKAGE_VERSION: ${{ github.event.inputs.package_version || '0.5.0' }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || 'v0.5.0' }}
        run: >
          python .github/scripts/fresh_install_smoke.py
          --source ${{ matrix.source }}
          --package-version "$env:PACKAGE_VERSION"
          --release-tag "$env:RELEASE_TAG"
        if: runner.os == 'Windows'

      - name: Run fresh install smoke
        env:
          PACKAGE_VERSION: ${{ github.event.inputs.package_version || '0.5.0' }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || 'v0.5.0' }}
        run: >
          python .github/scripts/fresh_install_smoke.py
          --source ${{ matrix.source }}
          --package-version "$PACKAGE_VERSION"
          --release-tag "$RELEASE_TAG"
        if: runner.os != 'Windows'
