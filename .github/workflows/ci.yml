name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] build

      - name: Run tests
        run: pytest -q

      - name: Run benchmark validation smoke
        run: qs-dmss benchmarks validate --scenario demo-baseline --output-root benchmark-validation

      - name: Compile package
        run: python -m compileall src

      - name: Validate cockpit JavaScript syntax
        run: node --check src/qs_dmss/cockpit/static/app.js

      - name: Build release artifacts
        run: python -m build --sdist --wheel

      - name: Check release artifacts
        run: python -m twine check dist/*

      - name: Validate release artifact contents
        shell: bash
        run: |
          python - <<'PY'
          from importlib import metadata
          from pathlib import Path
          import tarfile
          import zipfile

          version = metadata.version("qs-dmss")
          dist = Path("dist")
          wheel = dist / f"qs_dmss-{version}-py3-none-any.whl"
          sdist = dist / f"qs_dmss-{version}.tar.gz"
          assert wheel.exists(), wheel
          assert sdist.exists(), sdist

          with zipfile.ZipFile(wheel) as archive:
              wheel_names = set(archive.namelist())
          assert "qs_dmss/assets/configs/demo.yaml" in wheel_names
          assert "qs_dmss/assets/schemas/run_config.schema.json" in wheel_names
          assert "qs_dmss/assets/benchmarks/scenarios/demo-baseline.yaml" in wheel_names
          assert "qs_dmss/assets/benchmarks/expected/demo-baseline.metrics.json" in wheel_names
          assert "qs_dmss/assets/showcases/canonical-simulation.yaml" in wheel_names
          assert (
              "qs_dmss/assets/showcases/self-interaction-response.yaml"
              in wheel_names
          )
          assert (
              "qs_dmss/assets/showcases/fractal-quadrant-validation-preview.yaml"
              in wheel_names
          )
          assert "qs_dmss/assets/quantum/fractal-fuzzy-4x4.yaml" in wheel_names
          assert "qs_dmss/cockpit/static/favicon.svg" in wheel_names
          assert "qs_dmss/cockpit/static/hosted-demo-social-preview.png" in wheel_names

          sdist_root = f"qs_dmss-{version}/"
          with tarfile.open(sdist) as archive:
              sdist_names = set(archive.getnames())
          assert sdist_root + "RELEASE.md" in sdist_names
          assert (
              sdist_root
              + "docs/decisions/0001-commercial-sustainability-and-licensing-boundary.md"
              in sdist_names
          )
          assert sdist_root + "benchmarks/README.md" in sdist_names
          assert sdist_root + "configs/demo.yaml" in sdist_names
          assert sdist_root + "schemas/run_config.schema.json" in sdist_names
          assert (
              sdist_root + "src/qs_dmss/assets/benchmarks/scenarios/demo-baseline.yaml"
              in sdist_names
          )
          assert (
              sdist_root + "src/qs_dmss/assets/showcases/canonical-simulation.yaml"
              in sdist_names
          )
          assert (
              sdist_root
              + "src/qs_dmss/assets/showcases/self-interaction-response.yaml"
              in sdist_names
          )
          assert (
              sdist_root
              + "src/qs_dmss/assets/showcases/fractal-quadrant-validation-preview.yaml"
              in sdist_names
          )
          assert (
              sdist_root
              + "src/qs_dmss/assets/quantum/fractal-fuzzy-4x4.yaml"
              in sdist_names
          )
          assert sdist_root + "src/qs_dmss/cockpit/static/favicon.svg" in sdist_names
          assert (
              sdist_root
              + "src/qs_dmss/cockpit/static/hosted-demo-social-preview.png"
              in sdist_names
          )
          PY

      - name: Smoke test installed wheel
        shell: bash
        run: |
          python -m venv wheel-smoke
          ./wheel-smoke/bin/pip install --upgrade pip
          ./wheel-smoke/bin/pip install dist/*.whl
          mkdir -p /tmp/qs-dmss-wheel-smoke
          cd /tmp/qs-dmss-wheel-smoke
          "$GITHUB_WORKSPACE"/wheel-smoke/bin/qs-dmss run-demo --output-root runs
          "$GITHUB_WORKSPACE"/wheel-smoke/bin/qs-dmss benchmarks validate --scenario demo-baseline
          "$GITHUB_WORKSPACE"/wheel-smoke/bin/qs-dmss showcase run --output-root simulation-showcase

  quantum-sidecar:
    name: Quantum sidecar
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install quantum test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,quantum] build

      - name: Run quantum sidecar tests
        run: pytest -q tests/test_quantum_sidecar.py tests/test_quantum_request.py tests/test_quantum_compilation.py

      - name: Build quantum release wheel
        run: python -m build --wheel

      - name: Run quantum paths from installed wheel
        shell: bash
        run: |
          python -m venv quantum-wheel-smoke
          ./quantum-wheel-smoke/bin/pip install --upgrade pip
          wheel=$(find dist -name '*.whl' -print -quit)
          ./quantum-wheel-smoke/bin/pip install "${wheel}[quantum]"
          smoke_root=/tmp/qs-dmss-quantum-wheel-smoke
          mkdir -p "$smoke_root"
          cd "$smoke_root"
          "$GITHUB_WORKSPACE"/quantum-wheel-smoke/bin/qs-dmss quantum validate-fractal \
            --shots 1024 \
            --output-root quantum-sidecar-validation
          "$GITHUB_WORKSPACE"/quantum-wheel-smoke/bin/qs-dmss quantum prepare-qpu-request \
            --shots 128 \
            --output-root qpu-request-validation
          "$GITHUB_WORKSPACE"/quantum-wheel-smoke/bin/qs-dmss quantum validate-compilation \
            --shots 128 \
            --output-root quantum-compilation-validation

      - name: Check quantum evidence and execution boundaries
        shell: bash
        run: |
          smoke_root=/tmp/qs-dmss-quantum-wheel-smoke
          test -f "$smoke_root"/quantum-sidecar-validation/quantum-sidecar-validation.json
          test -f "$smoke_root"/quantum-sidecar-validation/manifest.sha256.json
          test -f "$smoke_root"/quantum-sidecar-validation/quantum-sidecar-evidence.zip
          test -f "$smoke_root"/qpu-request-validation/qpu-request.json
          test -f "$smoke_root"/qpu-request-validation/artifacts/fractal-fuzzy-target.openqasm
          test -f "$smoke_root"/qpu-request-validation/manifest.sha256.json
          test -f "$smoke_root"/qpu-request-validation/qpu-request-evidence.zip
          test -f "$smoke_root"/quantum-compilation-validation/quantum-compilation-validation.json
          test -f "$smoke_root"/quantum-compilation-validation/quantum-compilation-matrix.csv
          test -f "$smoke_root"/quantum-compilation-validation/manifest.sha256.json
          test -f "$smoke_root"/quantum-compilation-validation/quantum-compilation-evidence.zip
          SMOKE_ROOT="$smoke_root" "$GITHUB_WORKSPACE"/quantum-wheel-smoke/bin/python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["SMOKE_ROOT"])
          sidecar = json.loads(
              (root / "quantum-sidecar-validation" / "quantum-sidecar-validation.json").read_text()
          )
          request = json.loads(
              (root / "qpu-request-validation" / "qpu-request.json").read_text()
          )
          compilation = json.loads(
              (root / "quantum-compilation-validation" / "quantum-compilation-validation.json").read_text()
          )

          assert sidecar["success"] is True
          assert sidecar["submission_policy"]["qpu_used"] is False
          assert sidecar["submission_policy"]["submitted"] is False
          assert request["success"] is True
          assert request["credential_policy"]["credentials_read"] is False
          assert request["submission_policy"]["submitted"] is False
          assert request["submission_policy"]["never_submit"] is True
          assert request["cost_policy"]["max_authorized_cost_usd"] == 0.0
          assert compilation["success"] is True
          assert len(compilation["matrix"]) == 12
          assert compilation["execution_policy"] == {
              "credentials_read": False,
              "local_simulation_only": True,
              "max_authorized_cost_usd": 0.0,
              "provider": None,
              "remote_api_called": False,
              "submitted": False,
          }
          PY

  docker:
    name: Docker smoke
    runs-on: ubuntu-latest
    needs: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build container image
        run: docker build -t qs-dmss:ci .

      - name: Run container and probe health
        shell: bash
        run: |
          cid=$(docker run -d -p 8001:8001 qs-dmss:ci)
          trap "docker logs $cid; docker rm -f $cid" EXIT
          for attempt in {1..20}; do
            if curl -fsS http://127.0.0.1:8001/api/health >/tmp/health.json; then
              break
            fi
            sleep 1
          done
          cat /tmp/health.json
          curl -fsS http://127.0.0.1:8001/api/configs >/tmp/configs.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/configs.json").read_text())
          assert payload["default_name"] == "demo.yaml", payload
          assert payload["items"], payload
          PY
