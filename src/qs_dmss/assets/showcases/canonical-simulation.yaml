run:
  name: canonical-simulation-showcase
  seed: 23
  output_root: runs

engine:
  backend: numpy
  grid_shape: [12, 12, 12]
  box_size: 1.2
  mass: 1.0
  g_int: 0.06
  time_step: 0.01
  num_steps: 10
  log_every: 1

initial:
  kind: gaussian
  amplitude: 0.2
  width: 0.22
  random_phase: true

objective:
  name: Canonical showcase stability check
  summary: Demonstrate deterministic scalar-field evolution with low drift, inspectable density outputs, and replayable evidence.
  primary_metric: energy_drift
  goal: minimize_abs

constraints:
  max_abs_energy_drift: 0.2
  max_abs_norm_drift: 0.3
  min_max_density: 0.1
  max_elapsed_seconds: 10.0
  require_verification: true

ranking:
  primary_metric_weight: 2.4
  weights:
    energy_drift: 1.0
    norm_drift: 0.9
    max_density: 0.7
    elapsed_seconds: 0.3
