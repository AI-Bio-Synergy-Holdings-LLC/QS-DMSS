run:
  name: conservation-baseline
  seed: 11
  output_root: runs

engine:
  backend: numpy
  grid_shape: [12, 12, 12]
  box_size: 1.0
  mass: 1.0
  g_int: 0.0
  time_step: 0.01
  num_steps: 20
  log_every: 2

initial:
  kind: gaussian
  amplitude: 1.0
  width: 0.24
  random_phase: false

objective:
  name: Conservation control
  summary: Establish a zero-interaction numerical baseline before interpreting nonlinear response.
  primary_metric: energy_drift
  goal: minimize_abs

constraints:
  max_abs_energy_drift: 0.1
  max_abs_norm_drift: 0.1
  max_elapsed_seconds: 10.0
  require_verification: true

ranking:
  primary_metric_weight: 2.0
  weights:
    energy_drift: 1.0
    norm_drift: 1.0
    elapsed_seconds: 0.2
