name: Feature Request
description: Suggest a focused product or research workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What user or reviewer outcome would this improve?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Suggested Scope
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation Signal
      description: How should we know this worked?
    validations:
      required: false
